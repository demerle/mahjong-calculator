services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      HOST: 0.0.0.0
      PORT: 8005
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; json.load(urllib.request.urlopen('http://127.0.0.1:8005/health'))"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8005}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
