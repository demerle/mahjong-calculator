<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400" role="img" aria-labelledby="title desc">
  <title id="title">White dragon mahjong tile</title>
  <desc id="desc">A white dragon tile with a blue double border and English WHITE mark.</desc>
  <defs>
    <linearGradient id="tileFace" x1="40" x2="260" y1="28" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.6" stop-color="#f6fbfb"/>
      <stop offset="1" stop-color="#e7f0ef"/>
    </linearGradient>
    <linearGradient id="tileSide" x1="60" x2="260" y1="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dde8e6"/>
      <stop offset="1" stop-color="#c9d8d5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#082626" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <rect x="37" y="24" width="226" height="354" rx="20" fill="url(#tileSide)"/>
    <rect x="31" y="18" width="226" height="354" rx="20" fill="url(#tileFace)" stroke="#d2dedb" stroke-width="4"/>
    <rect x="68" y="58" width="152" height="244" rx="9" fill="none" stroke="#1266a8" stroke-width="15"/>
    <rect x="91" y="83" width="106" height="194" rx="5" fill="none" stroke="#58a8d8" stroke-width="6"/>
    <path d="M88 105h111M88 253h111" fill="none" stroke="#1266a8" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
    <text x="144" y="179" text-anchor="middle" fill="#093d68" font-family="Arial, Helvetica, sans-serif" font-size="43" font-weight="800" letter-spacing="2">WHITE</text>
    <text x="144" y="223" text-anchor="middle" fill="#1266a8" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" letter-spacing="5">DRAGON</text>
  </g>
</svg>
